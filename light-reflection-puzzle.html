<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>光の反射 — Light Reflection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">
  <header>
    <div>
      <div class="brand"><span class="brand-icon"></span><h1>光の反射</h1></div>
      <div class="subtitle">Light Reflection — Mirror &amp; Color Puzzle</div>
    </div>
    <div class="tabs">
      <button class="tab-btn" id="tabEditorBtn">つくる</button>
      <button class="tab-btn" id="tabPlayBtn">プレイ</button>
    </div>
  </header>

  <!-- ============ EDITOR PANEL ============ -->
  <div class="panel" id="panelEditor">

    <div class="toolbar">
      <div class="toolbar-row">
        <span class="toolbar-label">盤の大きさ</span>
        <div class="size-ctrl">
          <button id="sizeDown">−</button>
          <span class="size-val" id="sizeVal">8 × 8</span>
          <button id="sizeUp">＋</button>
        </div>
      </div>
      <div class="toolbar-row" id="toolButtons">
        <button class="tool-btn" data-tool="wall"><span class="tool-swatch wall"></span>壁</button>
        <button class="tool-btn" data-tool="mirror"><span class="tool-swatch mirror"></span>ミラー</button>
        <button class="tool-btn" data-tool="converter"><span class="tool-swatch converter"></span>色変換パネル</button>
        <button class="tool-btn" data-tool="source"><span class="tool-swatch source"></span>光源</button>
        <button class="tool-btn" data-tool="goal"><span class="tool-swatch goal"></span>ゴール</button>
        <button class="tool-btn" data-tool="erase"><span class="tool-swatch erase"></span>消す</button>
      </div>
      <div class="toolbar-row" id="dirRow" style="display:none;">
        <span class="toolbar-label">光の向き</span>
        <div class="dir-picker">
          <button data-dir="up">↑</button>
          <button data-dir="left">←</button>
          <button data-dir="right">→</button>
          <button data-dir="down">↓</button>
        </div>
      </div>
      <div class="toolbar-row" id="colorRow" style="display:none;">
        <span class="toolbar-label">色</span>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="toolbar-row" id="sourceSettingsRow" style="display:none;">
        <span class="toolbar-label">光源設定</span>
        <div class="source-settings">
          <label class="toggle-label">
            <input type="checkbox" id="sourceRotatable">
            <span>回転可能</span>
          </label>
        </div>
      </div>
      <div class="toolbar-row" id="mirrorSettingsRow" style="display:none;">
        <span class="toolbar-label">ミラー設定</span>
        <div class="mirror-settings">
          <label class="toggle-label">
            <input type="checkbox" id="mirrorRotatable" checked>
            <span>回転可能</span>
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="mirrorDoubleSided" checked>
            <span>両面反射</span>
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="mirrorFilterEnabled">
            <span>色フィルター</span>
          </label>
          <div class="color-picker" id="mirrorFilterColorPicker" style="display:none;"></div>
        </div>
      </div>
      <div class="toolbar-row" id="converterSettingsRow" style="display:none;">
        <span class="toolbar-label">パネル設定</span>
        <div class="converter-settings" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <label class="toggle-label">
            <input type="checkbox" id="converterInteractive">
            <span>プレイ中にON/OFF可能</span>
          </label>
          <span class="toolbar-label" style="margin-left: 10px;">変換タイプ:</span>
          <label class="toggle-label">
            <input type="radio" name="converterType" value="replace" checked>
            <span>変更 (⇄)</span>
          </label>
          <label class="toggle-label">
            <input type="radio" name="converterType" value="add">
            <span>追加 (＋)</span>
          </label>
          <label class="toggle-label">
            <input type="radio" name="converterType" value="remove">
            <span>除外 (−)</span>
          </label>
        </div>
      </div>
      <div class="hint">
      </div>
    </div>

    <div class="hud">
      <div class="hud-title">エディター</div>
      <div class="hud-msg" id="editorMsg">ツールを選んでマス目に配置しよう</div>
      <button id="editClearBtn" class="btn">全消去</button>
    </div>

    <div class="board-wrap">
      <div class="board-frame">
        <div class="ruler-top" id="rulerTopE"></div>
        <div class="ruler-left" id="rulerLeftE"></div>
        <div class="board" id="boardE"><div class="grid" id="gridE"></div></div>
      </div>
    </div>

    <div class="toolbar-row">
      <input id="nameInput" class="name-input" type="text" placeholder="ステージ名（例：はじめの一歩）" maxlength="24">
      <button id="testPlayBtn" class="btn btn-primary">▶ テストプレイ</button>
    </div>

    <div class="toolbar-row official-meta-row">
      <span class="toolbar-label">ステージ情報</span>
      <label class="meta-field">
        <span class="meta-label">難易度</span>
        <select id="officialDifficulty" class="name-input meta-select">
          <option value="1">★☆☆</option>
          <option value="2">★★☆</option>
          <option value="3">★★★</option>
        </select>
      </label>
      <label class="meta-field meta-field-grow">
        <span class="meta-label">タグ</span>
        <input id="officialTags" class="name-input" type="text" placeholder="ミラー, 色混合（カンマ区切り）" maxlength="40">
      </label>
      <label class="meta-field meta-field-grow">
        <span class="meta-label">説明</span>
        <input id="officialDesc" class="name-input" type="text" placeholder="トップページに表示する説明文" maxlength="80">
      </label>
    </div>
    <div class="toolbar-row">
      <button id="exportOfficialBtn" class="btn btn-primary">📦 ファイルへ書き出す</button>
      <span class="hint-inline">書き出した JSON をサイト管理者がサーバーに追加すると、トップページの公式ステージ一覧に載ります</span>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">読み込む</span>
      <input id="importFileInput" type="file" accept=".json,application/json" style="display:none;">
      <button id="importFileBtn" class="btn">JSONファイルから読み込む</button>
    </div>
  </div>

  <!-- ============ PLAY PANEL ============ -->
  <div class="panel" id="panelPlay">

    <div id="playListView">
      <div class="hud"><div class="hud-title">公式ステージ</div></div>
      <div class="stage-list" id="stageList"></div>
    </div>

    <div id="playBoardView" style="display:none;">
      <div class="hud">
        <div class="hud-title" id="playTitle">ステージ</div>
        <div class="hud-msg" id="statusMsg">ミラーをクリックして光の向きを変えよう</div>
        <button id="resetBtn" class="btn">↺ リセット</button>
      </div>
      <div class="board-wrap">
        <div class="board-frame">
          <div class="ruler-top" id="rulerTop"></div>
          <div class="ruler-left" id="rulerLeft"></div>
          <div class="board" id="board">
            <div class="grid" id="grid"></div>
            <svg class="beam-svg" id="beamSvg"></svg>
          </div>
        </div>
      </div>
      <div class="toolbar-row">
        <button id="backToListBtn" class="btn">← 一覧へ戻る</button>
      </div>
    </div>
  </div>
</div>

<div class="clear-banner" id="clearBanner">
  <div class="clear-card">
    <h2 id="clearTitle">CLEAR</h2>
    <p id="clearText">すべてのゴールに到達しました！</p>
    <div class="row">
      <button class="btn" id="clearReplay">もう一度</button>
      <button class="btn btn-primary" id="clearBack">一覧へ戻る</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="scripts/color-system.js"></script>
<script src="scripts/beam-engine.js"></script>
<script src="scripts/ui-utils.js"></script>
<script src="scripts/official-stage.js"></script>
<script src="scripts/stages-loader.js"></script>
<script src="scripts/editor.js"></script>
<script src="scripts/play.js"></script>
<script src="scripts/app.js"></script>
</body>
</html>
